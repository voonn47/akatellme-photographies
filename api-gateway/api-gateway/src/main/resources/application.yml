server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: usuario-service
              uri: http://localhost:8082
              predicates:
                - Path=/usuario,/usuario/**,/usuario/tipo,/usuario/tipo/**,/sesion,/sesion/**

            - id: reservas-service
              uri: http://localhost:8083
              predicates:
                - Path=/reservas,/reservas/**

            - id: pagos-service
              uri: http://localhost:8084
              predicates:
                - Path=/pagos,/pagos/**

            - id: evento-service
              uri: http://localhost:8085
              predicates:
                - Path=/eventos,/eventos/**

            - id: notificaciones-service
              uri: http://localhost:8086
              predicates:
                - Path=/notificaciones,/notificaciones/**