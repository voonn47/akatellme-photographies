spring.application.name=service-pagos
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/db_pagos?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Ruta donde se generará el JSON de la documentación
springdoc.api-docs.path=/pagos/v3/api-docs
# Título de la documentación
springdoc.swagger-ui.path=/swagger-ui.html
